version: 2

updates:
  # Frontend npm dependencies
  - package-ecosystem: 'npm'
    directory: '/frontend'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'frontend'
    commit-message:
      prefix: 'chore'
    ignore:
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
    groups:
      frontend-react:
        patterns:
          - 'react'
          - 'react-dom'
          - 'react-router-dom'
          - '@types/react'
          - '@types/react-dom'
      frontend-vite:
        patterns:
          - 'vite'
          - '@vitejs/*'
      frontend-types:
        patterns:
          - '@types/*'
      frontend-eslint:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'
          - '@typescript-eslint/*'
          - 'globals'
      frontend-testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - '@testing-library/*'
          - 'jsdom'

  # Backend npm dependencies
  - package-ecosystem: 'npm'
    directory: '/backend'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'backend'
    commit-message:
      prefix: 'chore'
    ignore:
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
    groups:
      backend-fastify:
        patterns:
          - 'fastify'
          - '@fastify/*'
      backend-types:
        patterns:
          - '@types/*'
      backend-eslint:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'
          - '@typescript-eslint/*'

  # GitHub Actions workflow dependencies
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'chore'